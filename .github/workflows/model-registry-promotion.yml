name: model-registry-promotion

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Specific MLflow model version to promote"
        required: false
        type: string
      run_id:
        description: "Promote the latest registered version from this MLflow run"
        required: false
        type: string

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall src tests

      - name: Run promotion unit tests
        run: pytest -q tests

  promote-candidate:
    needs: ci
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      INPUT_MODEL_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.model_version || '' }}
      INPUT_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_id || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check promotion prerequisites
        id: preflight
        shell: bash
        run: |
          can_promote=true
          reason=""

          if [[ -z "$MLFLOW_TRACKING_URI" ]]; then
            can_promote=false
            reason="Skipping promotion because MLFLOW_TRACKING_URI secret is not configured."
          elif [[ "$MLFLOW_TRACKING_URI" == *"dagshub.com"* ]]; then
            resolved_username="${MLFLOW_TRACKING_USERNAME:-$DAGSHUB_USERNAME}"
            resolved_password="${MLFLOW_TRACKING_PASSWORD:-$DAGSHUB_TOKEN}"

            if [[ -z "$resolved_username" || -z "$resolved_password" ]]; then
              can_promote=false
              reason="Skipping promotion because DagsHub/MLflow auth secrets are not configured."
            else
              echo "MLFLOW_TRACKING_USERNAME=$resolved_username" >> "$GITHUB_ENV"
              echo "MLFLOW_TRACKING_PASSWORD=$resolved_password" >> "$GITHUB_ENV"
            fi
          fi

          echo "can_promote=$can_promote" >> "$GITHUB_OUTPUT"

          if [[ "$can_promote" != "true" ]]; then
            echo "$reason"
          fi

      - name: Load registry settings from params.yaml
        if: steps.preflight.outputs.can_promote == 'true'
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path
          import re

          text = Path("params.yaml").read_text(encoding="utf-8")
          patterns = {
              "MLFLOW_MODEL_NAME": r"^\s*register_model_name:\s*(.+)\s*$",
              "MLFLOW_CANDIDATE_ALIAS": r"^\s*candidate_alias:\s*(.+)\s*$",
              "MLFLOW_CANDIDATE_TAG_KEY": r"^\s*candidate_tag_key:\s*(.+)\s*$",
              "MLFLOW_CANDIDATE_TAG_VALUE": r"^\s*candidate_tag_value:\s*(.+)\s*$",
          }

          for env_name, pattern in patterns.items():
              match = re.search(pattern, text, re.MULTILINE)
              if not match:
                  raise SystemExit(f"Missing config for {env_name} in params.yaml")
              print(f"{env_name}={match.group(1).strip()}")
          PY

      - name: Skip promotion because registry secrets are unavailable
        if: steps.preflight.outputs.can_promote != 'true'
        shell: bash
        run: echo "Model registry promotion skipped for this run."

      - name: Promote model version to Candidate
        if: steps.preflight.outputs.can_promote == 'true'
        shell: bash
        run: |
          cmd=(
            python src/promote_model.py
            --tracking-uri "$MLFLOW_TRACKING_URI"
            --model-name "$MLFLOW_MODEL_NAME"
            --candidate-alias "$MLFLOW_CANDIDATE_ALIAS"
            --candidate-tag-key "$MLFLOW_CANDIDATE_TAG_KEY"
            --candidate-tag-value "$MLFLOW_CANDIDATE_TAG_VALUE"
          )

          if [ -n "$INPUT_MODEL_VERSION" ]; then
            cmd+=(--version "$INPUT_MODEL_VERSION")
          fi

          if [ -n "$INPUT_RUN_ID" ]; then
            cmd+=(--run-id "$INPUT_RUN_ID")
          fi

          "${cmd[@]}"
