apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: fraud-detection-grafana-dashboard
    files:
      - grafana-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

resources:
  - servicemonitor.yaml
  - prometheusrule.yaml
